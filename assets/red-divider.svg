<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="4" viewBox="0 0 1200 4" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f1d1d">
        <animate attributeName="stop-color" values="#7f1d1d;#dc2626;#ff4444;#dc2626;#7f1d1d" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="25%" style="stop-color:#dc2626">
        <animate attributeName="stop-color" values="#dc2626;#ff4444;#dc2626;#7f1d1d;#dc2626" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#ff4444">
        <animate attributeName="stop-color" values="#ff4444;#dc2626;#7f1d1d;#dc2626;#ff4444" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%" style="stop-color:#dc2626">
        <animate attributeName="stop-color" values="#dc2626;#7f1d1d;#dc2626;#ff4444;#dc2626" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#991b1b">
        <animate attributeName="stop-color" values="#991b1b;#dc2626;#ff4444;#dc2626;#991b1b" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <rect width="1200" height="4" rx="2" fill="url(#grad)"/>
</svg>